services:
  kong-database:
    image: postgres:17
    container_name: kong-database
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_DB=kong
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -U kong -d kong -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    network_mode: host
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "10"

  migrations:
    depends_on:
      kong-database:
        condition: service_healthy
    image: kong-with-psql:3.9
    container_name: migrations
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=localhost
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_DATABASE=kong
      - KONG_DNS_RESOLVER=8.8.8.8
    command: >
      /bin/bash -c "
        echo 'Waiting for Postgres to be ready...';
        for i in {1..120}; do
          pg_isready -h localhost -p 5432 -U kong -d kong -q && break;
          echo 'Postgres not ready, retrying ($$i/120)...';
          psql -h localhost -p 5432 -U kong -d kong -c 'SELECT 1' || echo 'PSQL connection test failed';
          nc -z localhost 5432 || echo 'Netcat test failed';
          sleep 2;
        done;
        if ! pg_isready -h localhost -p 5432 -U kong -d kong -q; then
          echo 'Error: Postgres is not ready after 240 seconds';
          exit 1;
        fi;
        echo 'Postgres is ready, running migrations...';
        kong migrations bootstrap -v
      "
    restart: on-failure
    network_mode: host
    

  kong:
    depends_on:
      kong-database:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    image: kong-root:3.9
    container_name: kong
    restart: always
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=localhost
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_DATABASE=kong
      - KONG_DNS_RESOLVER=8.8.8.8
      - KONG_PROXY_LISTEN=0.0.0.0:80, 0.0.0.0:443 ssl
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_NGINX_HTTP_RESOLVER=8.8.8.8
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_TRUSTED_IPS=0.0.0.0/0,::/0
      - KONG_REAL_IP_HEADER=CF-Connecting-IP
      - KONG_REAL_IP_RECURSIVE=on
      - KONG_LOG_LEVEL=info
      - KONG_PLUGINS=bundled,http-log
      - KONG_NGINX_HTTP_INCLUDE=/usr/local/kong/custom_nginx.conf
      - KONG_STATUS_LISTEN=0.0.0.0:8100
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    network_mode: host
    volumes:
      - ./kong_logs:/usr/local/kong/logs
      - ./kongblock/:/usr/local/kong/files:ro
      - ./kong.conf:/usr/local/kong/custom_nginx.conf:ro
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "10"

  mongo:
    image: mongo:5.0
    container_name: mongo
    restart: always
    volumes:
      - ./mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    network_mode: host
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "10"

  konga:
    depends_on:
      mongo:
        condition: service_healthy
    image: pantsel/konga
    container_name: konga
    restart: always
    environment:
      - DB_ADAPTER=mongo
      - DB_HOST=localhost
      - DB_PORT=27017
    network_mode: host
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "10"
        
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    network_mode: host
    restart: always
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "10"

  grafana:
    image: grafana/grafana:12.4.3-security-02
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - ./grafana_data:/var/lib/grafana
    network_mode: host
    restart: always
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "10"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    network_mode: host # ใช้ host network เพื่อเข้าถึงพอร์ต 9100
    pid: host
    volumes:
      - /proc:/proc:ro # Mount เฉพาะ /proc เพื่ออ่านเมตริก
      - /sys:/sys:ro   # Mount เฉพาะ /sys
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m" # จำกัดขนาด log ต่อไฟล์ที่ 10MB
        max-file: "10" # เก็บ log file สูงสุด 10 ไฟล์ (รวม 100MB)